services:
  # ============================================
  # MySQL 8 - Database Backend for Keycloak
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: keycloak-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: keycloak_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # RabbitMQ 3.13 - Message Queue
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: keycloak-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    ports:
      - "5673:5672"    # AMQP (mapped to 5673 to avoid conflict)
      - "15673:15672"  # Management UI (mapped to 15673)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Keycloak 26.2 - Identity & Access Management
  # Custom build with RabbitMQ Event Listener SPI
  # ============================================
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Database configuration (MySQL)
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak?useSSL=false&allowPublicKeyRetrieval=true
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password

      # RabbitMQ configuration (for Event Listener SPI)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin_password
      RABBITMQ_QUEUE_NAME: keycloak.user.registered
    ports:
      - "9090:8080"
    volumes:
      # Custom theme (mounted for hot-reload during development)
      - ./themes/flash-dtf:/opt/keycloak/themes/flash-dtf:ro
    networks:
      - keycloak-network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  keycloak-network:
    driver: bridge
